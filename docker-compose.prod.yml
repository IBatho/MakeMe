version: "3.9"

# Production Docker Compose — extends / overrides docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No port exposure in production — only accessible within the Docker network
    ports: []

  redis:
    restart: always
    # No port exposure in production
    ports: []

  backend:
    restart: always
    # No live-reload code mount in production
    volumes: []
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 4
        --no-access-log
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  celery:
    restart: always
    volumes: []
    command: >
      celery -A workers.celery_app worker
        --loglevel=warning
        --concurrency=4
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  celery-beat:
    restart: always
    volumes: []
    command: >
      celery -A workers.celery_app beat
        --loglevel=warning
        --scheduler celery.beat:PersistentScheduler
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend

volumes:
  postgres_data:
