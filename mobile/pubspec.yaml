name: makeme
description: Personal AI scheduling app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # HTTP client
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Local database (offline support)
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.2
  path: ^1.9.0

  # Location tracking (Phase 3)
  geolocator: ^13.0.1

  # Background execution (Phase 3)
  flutter_background_service: ^5.0.5

  # Calendar UI
  table_calendar: ^3.1.2

  # WebSocket client
  web_socket_channel: ^3.0.1

  # Deep links + external browser (OAuth flow)
  url_launcher: ^6.3.0

  # Misc UI
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  drift_dev: ^2.20.2

flutter:
  uses-material-design: true
